<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nephew's Learning Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { text-align: center; color: white; padding: 2rem; }
    h1 { font-size: 3rem; margin-bottom: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .login-box { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); max-width: 400px; margin: 0 auto; }
    .login-box input { width: 100%; padding: 1rem; font-size: 1.5rem; text-align: center; border: none; border-radius: 10px; margin-bottom: 1rem; }
    .btn { padding: 1rem 2rem; font-size: 1.5rem; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin: 0.5rem; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .btn-primary { background: #4CAF50; color: white; }
    .btn-secondary { background: #2196F3; color: white; }
    .hidden { display: none; }
    .game-area { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 20px; backdrop-filter: blur(10px); max-width: 800px; margin: 0 auto; }
    .letter-display { font-size: 10rem; font-weight: bold; margin: 2rem 0; text-shadow: 4px 4px 8px rgba(0,0,0,0.3); }
    .options-container { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; }
    .option-box { width: 150px; height: 150px; background: rgba(255,255,255,0.9); border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 4rem; font-weight: bold; color: #333; border: 5px solid transparent; transition: all 0.3s; }
    .option-box.selected { border-color: #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.7); transform: scale(1.1); }
    .option-box.correct { background: #4CAF50; color: white; animation: pulse 0.5s; }
    .option-box.wrong { background: #f44336; color: white; animation: shake 0.5s; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .levels-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin: 2rem 0; }
    .level-btn { width: 80px; height: 80px; font-size: 2rem; border-radius: 15px; border: none; cursor: pointer; transition: all 0.2s; }
    .level-btn.current { background: #FFD700; color: #333; transform: scale(1.1); }
    .level-btn.completed { background: #4CAF50; color: white; }
    .level-btn.locked { background: #666; color: #999; cursor: not-allowed; }
    .controller-hint { margin-top: 2rem; font-size: 1.2rem; opacity: 0.8; }
    .status-message { font-size: 2rem; margin: 1rem 0; padding: 1rem; border-radius: 10px; }
    .status-message.success { background: #4CAF50; }
    .status-message.error { background: #f44336; }
    .debug-log { text-align: left; font-size: 0.8rem; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 10px; margin-top: 1rem; max-height: 200px; overflow-y: auto; }
    .debug-log p { margin: 0.3rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 Learning Game</h1>
    <div id="debug-log" class="debug-log" style="display:none;"></div>
    <div id="login-section" class="login-box">
      <p style="margin-bottom: 1rem; font-size: 1.2rem;">Welcome!</p>
      <button id="register-btn" class="btn btn-secondary">New Player</button>
      <br><br>
      <input type="number" id="profile-id" placeholder="Your ID" min="1">
      <button id="login-btn" class="btn btn-primary">Login</button>
    </div>
    <div id="dashboard-section" class="game-area hidden">
      <h2>Your Progress</h2>
      <p>Current Level: <span id="current-level">1</span></p>
      <div class="levels-grid" id="levels-grid"></div>
      <button id="start-btn" class="btn btn-primary">Start Game</button>
      <button id="logout-btn" class="btn btn-secondary">Switch Player</button>
    </div>
    <div id="game-section" class="game-area hidden">
      <div class="letter-display" id="letter-display">A</div>
      <div class="options-container" id="options-container">
        <div class="option-box" data-index="0"></div>
        <div class="option-box" data-index="1"></div>
        <div class="option-box" data-index="2"></div>
      </div>
      <div id="status-message" class="status-message hidden"></div>
      <p class="controller-hint">Use D-Pad to move • Press X to select</p>
    </div>
  </div>

  <script type="module">
    import { ConvexHttpClient } from 'https://esm.sh/convex@1.39.1';

    const CONVEX_URL = "https://veracious-oriole-103.convex.cloud";
    const convex = new ConvexHttpClient(CONVEX_URL);

    let currentProfileId = localStorage.getItem('profile_id') || null;
    let currentLevelId = 1;
    let selectedBoxIndex = 2;
    let gamepadInterval = null;
    let levelsData = [];

    function log(msg) {
      console.log('[GAME]', msg);
      const logEl = document.getElementById('debug-log');
      if (logEl) {
        logEl.style.display = 'block';
        logEl.innerHTML += `<p>${new Date().toLocaleTimeString()} - ${msg}</p>`;
        logEl.scrollTop = logEl.scrollHeight;
      }
    }

    async function register() {
      log('Register: Starting...');
      log('Register: currentProfileId before = ' + currentProfileId);
      try {
        log('Register: Calling convex.mutation(register, {})');
        const result = await convex.mutation('register', {});
        log('Register: Result = ' + JSON.stringify(result));
        const id = result.id || Date.now();
        log('Register: ID = ' + id);
        alert('Your ID is: ' + id + '. Remember it!');
        localStorage.setItem('profile_id', id.toString());
        currentProfileId = id;
        log('Register: currentProfileId after = ' + currentProfileId);
        showDashboard();
      } catch (e) {
        log('Register ERROR: ' + e.message);
        console.error('Register error:', e);
        alert('Registration failed: ' + e.message);
      }
    }

    async function login() {
      const id = document.getElementById('profile-id').value;
      if (!id) return alert('Please enter your ID');
      log('Login: id = ' + id);
      try {
        const result = await convex.mutation('login', { id: parseInt(id) });
        log('Login: result = ' + JSON.stringify(result));
        if (result.success) {
          currentProfileId = parseInt(id);
          localStorage.setItem('profile_id', id);
          showDashboard();
        } else {
          alert('Profile not found');
        }
      } catch (e) {
        log('Login ERROR: ' + e.message);
        console.error('Login error:', e);
        alert('Login failed: ' + e.message);
      }
    }

    async function showDashboard() {
      log('showDashboard: Starting...');
      log('showDashboard: currentProfileId = ' + currentProfileId);
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.remove('hidden');
      await loadLevels();
    }

    async function loadLevels() {
      log('loadLevels: Starting...');
      try {
        log('loadLevels: Calling getAllLevels query');
        const result = await convex.query('getAllLevels', {});
        log('loadLevels: getAllLevels result = ' + JSON.stringify(result));
        levelsData = result || [];
      } catch (e) {
        log('loadLevels ERROR: ' + e.message);
        levelsData = [];
      }
      const grid = document.getElementById('levels-grid');
      grid.innerHTML = '';
      let currentLevel = 1;
      log('loadLevels: currentProfileId = ' + currentProfileId);
      try {
        const profile = await convex.query('getProfile', { id: currentProfileId });
        log('loadLevels: getProfile result = ' + JSON.stringify(profile));
        currentLevel = profile?.currentLevel || 1;
      } catch (e) {
        log('loadLevels getProfile ERROR: ' + e.message);
      }
      document.getElementById('current-level').textContent = currentLevel;
      const maxLevel = Math.max(levelsData.length, currentLevel, 5);
      log('loadLevels: maxLevel = ' + maxLevel + ', levelsData.length = ' + levelsData.length);
      for (let i = 1; i <= maxLevel; i++) {
        const btn = document.createElement('button');
        btn.className = 'level-btn';
        btn.textContent = i;
        if (i < currentLevel) btn.classList.add('completed');
        else if (i === currentLevel) { btn.classList.add('current'); btn.onclick = () => startLevel(i); }
        else btn.classList.add('locked');
        grid.appendChild(btn);
      }
    }

    function startLevel(levelId) {
      log('startLevel: ' + levelId);
      currentLevelId = levelId;
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('game-section').classList.remove('hidden');
      document.getElementById('letter-display').textContent = 'A';
      const boxes = document.querySelectorAll('.option-box');
      const options = ['A', 'B', ''];
      boxes.forEach((box, i) => { box.textContent = options[i] || ''; box.className = 'option-box'; });
      selectedBoxIndex = 2;
      boxes[selectedBoxIndex].classList.add('selected');
      document.getElementById('status-message').classList.add('hidden');
      startControllerPolling();
    }

    function startControllerPolling() {
      if (gamepadInterval) clearInterval(gamepadInterval);
      gamepadInterval = setInterval(() => {
        const gamepads = navigator.getGamepads();
        const gp = gamepads[0];
        if (!gp) return;
        const boxes = document.querySelectorAll('.option-box');
        if (gp.buttons[12].pressed && selectedBoxIndex > 0) {
          boxes[selectedBoxIndex].classList.remove('selected');
          selectedBoxIndex--;
          boxes[selectedBoxIndex].classList.add('selected');
        }
        if (gp.buttons[13].pressed && selectedBoxIndex < 2) {
          boxes[selectedBoxIndex].classList.remove('selected');
          selectedBoxIndex++;
          boxes[selectedBoxIndex].classList.add('selected');
        }
        if (gp.buttons[0].pressed) submitAnswer(selectedBoxIndex);
      }, 100);
    }

    async function submitAnswer(boxIndex) {
      const boxes = document.querySelectorAll('.option-box');
      const selectedOption = boxes[boxIndex].textContent;
      log('submitAnswer: boxIndex=' + boxIndex + ', selectedOption=' + selectedOption);
      try {
        const result = await convex.mutation('submitAnswer', { profileId: currentProfileId, levelId: currentLevelId, selectedOption });
        log('submitAnswer: result = ' + JSON.stringify(result));
        const statusEl = document.getElementById('status-message');
        statusEl.classList.remove('hidden');
        if (result.correct) {
          boxes[boxIndex].classList.add('correct');
          statusEl.className = 'status-message success';
          statusEl.textContent = '✓ Correct!';
          setTimeout(() => showDashboard(), 1500);
        } else {
          boxes[boxIndex].classList.add('wrong');
          statusEl.className = 'status-message error';
          statusEl.textContent = '✗ Try Again!';
          setTimeout(() => { boxes[boxIndex].classList.remove('wrong'); statusEl.classList.add('hidden'); }, 1000);
        }
      } catch (e) { log('submitAnswer ERROR: ' + e.message); }
    }

    function logout() {
      localStorage.removeItem('profile_id');
      currentProfileId = null;
      if (gamepadInterval) clearInterval(gamepadInterval);
      document.getElementById('dashboard-section').classList.add('hidden');
      document.getElementById('game-section').classList.add('hidden');
      document.getElementById('login-section').classList.remove('hidden');
    }

    document.getElementById('register-btn').addEventListener('click', register);
    document.getElementById('login-btn').addEventListener('click', login);
    document.getElementById('start-btn').addEventListener('click', () => {
      const stored = localStorage.getItem('profile_id');
      log('start-btn clicked, stored=' + stored);
      if (stored) startLevel(parseInt(stored));
      else startLevel(1);
    });
    document.getElementById('logout-btn').addEventListener('click', logout);
    log('Script initialized, currentProfileId=' + currentProfileId);
  </script>
</body>
</html>
